name: Release

on:
  push:
    tags:
      - 'v*'
  # Allow a manual build+package smoke test (all matrix targets, incl. macOS)
  # without cutting a tag. The publish job below is gated on a tag ref, so a
  # workflow_dispatch run uploads artifacts but does NOT create a release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      # Do not let one platform's failure cancel the others, so a red target
      # still lets the healthy tarballs upload for inspection.
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_name: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_name: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_name: macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_name: macos-arm64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    # All four targets are required. macOS arm64 was `continue-on-error` while
    # the vendored libffi 3.4.x could not assemble under Apple Clang 16/17+
    # (Mach-O CFI, upstream libffi #852). The vendored-libffi bump (ADR-0012)
    # fixed it — verified green by workflow_dispatch run 29672036475 on all four
    # targets — so the safety net is removed: a macOS regression now fails the
    # release loudly instead of silently dropping binaries (which is how every
    # Release since v0.3.1 shipped no macOS tarballs).
    continue-on-error: ${{ matrix.optional || false }}

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      # rust-cache restores the registry + built dependencies instead of the
      # whole multi-GB target/, which is faster and far more reliable than the
      # raw actions/cache (which frequently overran the cache-size limit and
      # missed). `shared-key` is the target triple so each matrix leg keeps its
      # own cache (the four targets produce incompatible artifacts).
      - name: Cache cargo (rust-cache)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcre2-dev

      # Build both shipped binaries: the interpreter (`mutsu`) and the package
      # manager shim (`mzef`).
      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin mutsu --bin mzef

      # Assemble the distribution tree so an unpacked release is self-contained
      # and `mzef` finds the bundled zef with no configuration. `bin/` and
      # `share/` sit at the archive ROOT (no wrapping version directory) so
      # mise's github-backend autodetection finds `bin/` with zero config:
      #
      #   bin/mutsu
      #   bin/mzef
      #   share/mutsu/zef/...       <- mzef resolves this via ../share/mutsu/zef
      #   share/mutsu/modules/...   <- bundled batteries; mutsu resolves them via
      #                                ../share/mutsu/modules (zero-config `use`)
      #
      # mise extracts the whole archive into the tool's install dir and exposes
      # `bin/` on PATH, so both commands work after `mise use`.
      - name: Package
        run: |
          set -eu
          pkg="mutsu-${{ github.ref_name }}-${{ matrix.archive_name }}"
          stage="staging/$pkg"
          mkdir -p "$stage/bin" "$stage/share/mutsu"
          cp "target/${{ matrix.target }}/release/mutsu" "$stage/bin/"
          cp "target/${{ matrix.target }}/release/mzef" "$stage/bin/"
          cp -R vendor/zef "$stage/share/mutsu/zef"
          cp -R modules "$stage/share/mutsu/modules"
          tar -C "$stage" -czf "$pkg.tar.gz" bin share
          echo "Packaged $pkg.tar.gz:"
          tar tzf "$pkg.tar.gz" | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mutsu-${{ matrix.archive_name }}
          path: mutsu-${{ github.ref_name }}-${{ matrix.archive_name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    # Only publish a GitHub Release for a real tag push. workflow_dispatch runs
    # stop after build (artifacts are available for inspection, no release).
    if: ${{ github.ref_type == 'tag' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      # Publish SHA256 checksums alongside the tarballs so downloaders (and the
      # mise github/ubi backend) can verify the binaries.
      - name: Generate checksums
        run: sha256sum mutsu-*.tar.gz > mutsu-${{ github.ref_name }}-SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mutsu-*.tar.gz
            mutsu-${{ github.ref_name }}-SHA256SUMS.txt
