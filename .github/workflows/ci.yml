name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    # The job does two full cargo builds (debug for `prove t/`, release for
    # roast) plus clippy, unit tests, and the ~7 min roast suite. At 15 min the
    # job was hitting the limit and getting canceled even when every test
    # passed (roast printing "Result: PASS" immediately before cancellation).
    # 25 min gives headroom for a cold/partial cargo cache.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install prove
        run: sudo apt-get update && sudo apt-get install -y perl

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test
        env:
          RUST_MIN_STACK: 8388608

      - name: Build (debug, for TAP tests)
        run: cargo build

      - name: TAP tests (prove t/)
        run: prove -e 'timeout 30 target/debug/mutsu' t/

      - name: Build (release, for roast)
        # The repo sets `[profile.release] debug = true` for local perf
        # profiling. CI never profiles, and full debug info bloats the binary
        # (~250MB -> ~27MB) and slows codegen/linking by ~70s. Override it to
        # off for CI only; Cargo.toml stays debug=true for local use.
        run: cargo build --release
        env:
          CARGO_PROFILE_RELEASE_DEBUG: "false"

      - name: Roast whitelist is sorted
        run: make check-roast-whitelist

      - name: Clean precomp cache and restore roast files
        run: |
          rm -rf ~/.cache/mutsu/precomp
          git checkout -- roast/

      - name: Roast tests (make roast)
        # -j4 matches the GitHub ubuntu-latest core count. The roast suite is
        # dominated by sleep/timer-bound S17 concurrency tests that leave the
        # CPU idle; running them in parallel overlaps that idle time with the
        # CPU-bound tests and cuts wall-clock roughly 3x (~7.5min -> ~2.5min).
        # Do not oversubscribe past the core count: the S17 scheduler/promise
        # tests assert on real wall-clock scheduling and flake under CPU
        # starvation.
        #
        # `--state=save` records pass/fail in `.prove` so the failure-summary
        # step below can re-run only the failures, serially and verbosely.
        # `--merge` folds each test's stderr into its stdout so a Rust panic or
        # `expected/got` diagnostic stays attached to its own test under -j
        # instead of scattering across the interleaved parallel output. The full
        # output is tee'd to tmp/roast.log and uploaded as an artifact, because
        # the GitHub web log viewer truncates this long step and hides prove's
        # end-of-run "Test Summary Report" (the clean failed-files list).
        run: |
          set -o pipefail
          mkdir -p tmp
          prove -j4 --state=save --merge -e 'scripts/run-roast-test.sh' \
            $(cat roast-whitelist.txt) 2>&1 | tee tmp/roast.log
        env:
          MUTSU_BIN: target/release/mutsu

      - name: Roast failure summary
        # Only runs when the roast step failed. Re-runs just the failed files
        # (from `.prove`) serially and verbosely, so the actionable failure
        # output is grouped at the end of the job log instead of buried in the
        # truncated parallel run. A flaky concurrency test that passes here is
        # itself a useful signal (intermittent, not a hard regression).
        if: failure()
        run: |
          echo "::group::Failed roast files — Test Summary Report"
          grep -E "Result:|Failed |Test Summary|Dubious|wstat|Files=" tmp/roast.log || true
          echo "::endgroup::"
          echo "::group::Failed roast files — serial verbose re-run"
          prove --state=failed -v --merge -e 'scripts/run-roast-test.sh' || true
          echo "::endgroup::"
        env:
          MUTSU_BIN: target/release/mutsu

      - name: Upload roast log
        # Always upload the full (untruncated) roast log so a failure can be
        # diagnosed from the artifact even when the web log viewer truncates the
        # step. Retained briefly; this is a debugging aid, not a release artifact.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roast-log
          path: tmp/roast.log
          retention-days: 7
          if-no-files-found: ignore

  wasm-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-wasm-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-wasm-${{ runner.os }}-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: |
          wasm-pack build --target web --no-default-features --features wasm
          mv pkg wasm-demo/pkg

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: node wasm-demo/e2e.test.mjs

  gc-stress:
    # Runs the whole test + roast suite with the GC cycle collector ON
    # (design doc §9.3's `GC=on` stress job). `MUTSU_GC_EVERY_CANDIDATE=N`
    # collects a cycle every N candidate pushes at the next safepoint, and
    # `MUTSU_GC_VERIFY=1` checks the collector's soundness invariants around each
    # collect. The point: the collector, exercised against every program in the
    # suite, must never corrupt live data. Cross-thread scans run under the
    # cooperative stop-the-world (design §6.1).
    #
    # N=1024, not 64: the trigger fires a FULL trial-deletion scan whose cost
    # is O(live suspect graph), so a small period is quadratic on workloads
    # that grow a large live structure while churning candidates —
    # S17-lowlevel/cas-loop.t (4x1000 cas ops building a linked list) ran
    # >180s at N=64 (8500+ collects x ~4300 traced nodes each) vs 3.3s at
    # N=1024, blowing the 30s per-file roast budget. 1024 still drives
    # thousands of collects across the suite (the soundness/VERIFY coverage
    # the job exists for) without turning the stress knob into a de facto
    # different asymptotic class. The production default-on trigger will use
    # a buffer-size threshold with adaptive backoff instead (ADR-0003).
    #
    # EVERY step is a BLOCKING gate (roast promoted 2026-07-05 after the
    # advisory-era failure classes were fixed — #4205/#4213/#4215): `cargo
    # test` (collector unit tests + gc_stress integration tests), `prove t/`,
    # the roast whitelist, and the final "No GC verify violations" step (any
    # `VERIFY FAIL` in the suite = heap corruption). A failure anywhere here
    # is a real GC regression.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MUTSU_GC: "on"
      MUTSU_GC_EVERY_CANDIDATE: "1024"
      MUTSU_GC_VERIFY: "1"
      # GC=on + VERIFY runs the roast suite ~2x slower across the board;
      # scale every per-file timeout accordingly (see run-roast-test.sh) —
      # S17-lowlevel/thread.t sat at ~24s against the 30s GC-off budget and
      # timed out on a loaded runner the first time this step ran blocking.
      MUTSU_ROAST_TIMEOUT_SCALE: "2"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-gcstress-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-gcstress-${{ runner.os }}-

      - name: Install prove
        run: sudo apt-get update && sudo apt-get install -y perl

      - name: Unit + integration tests (GC on)
        # Single-threaded: with MUTSU_GC=on, parallel in-process test threads
        # share the process-global collector state (candidate buffer, mutator
        # worker count, STW flags), so an interpreter test's safepoint collect
        # can steal another test's buffered candidates or react to its fake
        # registered workers — intermittent unit-test failures that are test
        # isolation artifacts, not GC bugs (seen: buffering_marks_purple_and_
        # dedupes, collect_is_deferred_while_a_mutator_worker_is_active,
        # stw_times_out_against_a_non_cooperating_worker). Serializing tests
        # removes the cross-talk; the multi-threaded GC coverage lives in the
        # subprocess-based tests/gc_stress.rs and the prove t/ suite below.
        # Costs ~1s over the parallel run.
        run: cargo test -- --test-threads=1
        env:
          RUST_MIN_STACK: 8388608

      - name: Build (debug, for TAP tests)
        run: cargo build

      - name: TAP tests (prove t/, GC on)
        # BLOCKING since the DESTROY-on-reclaim / dead-sweep slice: the whole
        # t/ suite passes under GC=on, so a failure here is a real GC
        # regression (semantics or soundness), not a known gap.
        run: |
          set -o pipefail
          mkdir -p tmp
          prove --merge -e 'timeout 60 target/debug/mutsu' t/ 2>&1 | tee tmp/gc-stress-t.log

      - name: Build (release, for roast)
        run: cargo build --release
        env:
          CARGO_PROFILE_RELEASE_DEBUG: "false"

      - name: Clean precomp cache and restore roast files
        run: |
          rm -rf ~/.cache/mutsu/precomp
          git checkout -- roast/

      - name: Roast tests (make roast, GC on)
        # BLOCKING (promoted 2026-07-05): the whole whitelist passes under
        # GC=on since the three advisory-era failure classes were fixed — STW
        # spawn-churn starvation (#4205), shared-env phantom edges (#4213),
        # and the EVERY_CANDIDATE=64 quadratic (#4215, knob now 1024). A
        # failure here is a real GC regression, same as the prove-t/ step.
        # Keep `set -o pipefail` so prove's exit status survives the tee.
        run: |
          set -o pipefail
          mkdir -p tmp
          prove -j4 --merge -e 'scripts/run-roast-test.sh' \
            $(cat roast-whitelist.txt) 2>&1 | tee tmp/gc-stress-roast.log
        env:
          MUTSU_BIN: target/release/mutsu

      - name: No GC verify violations
        # `MUTSU_GC_VERIFY` logs `VERIFY FAIL` to stderr but does not by itself
        # fail the process, so a heap-corruption bug could pass unnoticed. Fail
        # the job if any collect reported a soundness violation.
        run: |
          if grep -q "VERIFY FAIL" tmp/gc-stress-t.log tmp/gc-stress-roast.log; then
            echo "::error::GC collector reported VERIFY FAIL under stress"
            grep -n "VERIFY FAIL" tmp/gc-stress-t.log tmp/gc-stress-roast.log | head -30
            exit 1
          fi
          echo "No GC verify violations across the suite."

      - name: Upload GC stress logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gc-stress-logs
          path: |
            tmp/gc-stress-t.log
            tmp/gc-stress-roast.log
          retention-days: 7
          if-no-files-found: ignore

  jit-stress:
    # Runs the whole test + roast suite with the Cranelift JIT ON (ADR-0004
    # §2.5 J2, same shape as gc-stress). MUTSU_JIT_THRESHOLD=2 compiles every
    # Tier A-eligible chunk on its second call, so JIT-compiled bodies (not
    # the interpreter) execute for essentially all repeatedly-called code in
    # the suite. The JIT's correctness contract is byte-identical output to
    # the interpreter, so every step is a BLOCKING gate: any failure here that
    # does not reproduce with MUTSU_JIT=off is a JIT codegen/shim bug.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MUTSU_JIT: "on"
      MUTSU_JIT_THRESHOLD: "2"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-jitstress-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-jitstress-${{ runner.os }}-

      - name: Install prove
        run: sudo apt-get update && sudo apt-get install -y perl

      - name: Build (debug, for TAP tests)
        run: cargo build

      - name: TAP tests (prove t/, JIT on)
        run: |
          set -o pipefail
          mkdir -p tmp
          prove --merge -e 'timeout 60 target/debug/mutsu' t/ 2>&1 | tee tmp/jit-stress-t.log

      - name: Build (release, for roast)
        run: cargo build --release
        env:
          CARGO_PROFILE_RELEASE_DEBUG: "false"

      - name: Clean precomp cache and restore roast files
        run: |
          rm -rf ~/.cache/mutsu/precomp
          git checkout -- roast/

      - name: Roast tests (make roast, JIT on)
        run: |
          set -o pipefail
          mkdir -p tmp
          prove -j4 --merge -e 'scripts/run-roast-test.sh' \
            $(cat roast-whitelist.txt) 2>&1 | tee tmp/jit-stress-roast.log
        env:
          MUTSU_BIN: target/release/mutsu

      - name: Upload JIT stress logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jit-stress-logs
          path: |
            tmp/jit-stress-t.log
            tmp/jit-stress-roast.log
          retention-days: 7
          if-no-files-found: ignore
