name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    # The job does two full cargo builds (debug for `prove t/`, release for
    # roast) plus clippy, unit tests, and the ~7 min roast suite. At 15 min the
    # job was hitting the limit and getting canceled even when every test
    # passed (roast printing "Result: PASS" immediately before cancellation).
    # 25 min gives headroom for a cold/partial cargo cache.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Install prove
        run: sudo apt-get update && sudo apt-get install -y perl

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test
        env:
          RUST_MIN_STACK: 8388608

      - name: Build (debug, for TAP tests)
        run: cargo build

      - name: TAP tests (prove t/)
        run: prove -e 'timeout 30 target/debug/mutsu' t/ || echo "TAP tests had failures (non-fatal; roast is authoritative)"

      - name: Build (release, for roast)
        run: cargo build --release

      - name: Roast whitelist is sorted
        run: make check-roast-whitelist

      - name: Clean precomp cache and restore roast files
        run: |
          rm -rf ~/.cache/mutsu/precomp
          git checkout -- roast/

      - name: Roast tests (make roast)
        run: prove -e 'scripts/run-roast-test.sh' $(cat roast-whitelist.txt)
        env:
          MUTSU_BIN: target/release/mutsu

  wasm-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-wasm-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-wasm-${{ runner.os }}-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: |
          wasm-pack build --target web --no-default-features --features wasm
          mv pkg wasm-demo/pkg

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: node wasm-demo/e2e.test.mjs
