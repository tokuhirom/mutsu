name: Deploy WASM Demo to GitHub Pages

on:
  # A deploy is a full `wasm-pack build` — ~3 min to compile plus ~9 min of
  # `wasm-opt` on the 17 MB artifact. Running that on every main push costs
  # ~12 min of CI per merge to republish a byte-identical page, so the push
  # trigger is narrowed to the files the deployed site is actually built from.
  #
  # Deliberately NOT listed: `src/**`. Nearly every commit touches it, which
  # would restore the every-merge build. The consequence is that the playground
  # runs the interpreter from the last deploy, not from HEAD — when you want it
  # to pick up interpreter changes, trigger this workflow by hand
  # (`gh workflow run pages.yml`, or the "Run workflow" button).
  push:
    branches: [main]
    paths:
      - 'wasm-demo/**'
      - 'scripts/bench-visualize.py'   # renders bench-trend.html
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: |
          wasm-pack build --target web --no-default-features --features wasm
          mv pkg wasm-demo/pkg

      - name: Record compatibility stats
        # The landing page headlines "N% of the official spec files pass". Count
        # it here rather than hand-writing it into the copy, so the figure cannot
        # drift away from the suite (the README's did). The site falls back to a
        # baked-in number when this file is absent, i.e. in a local checkout.
        run: |
          pass=$(grep -c . roast-whitelist.txt)
          total=$(find roast -name '*.t' -type f | wc -l)
          printf '{"roastPass":%d,"roastTotal":%d}\n' "$pass" "$total" \
            > wasm-demo/content/stats.json
          cat wasm-demo/content/stats.json

      - name: Render bench-trend dashboard
        # Pull the perf history from the bench-data branch and render it into the
        # deployed site as bench-trend.html, so the trend is viewable at
        # <pages-url>/bench-trend.html with no download. The data is up to the
        # PREVIOUS main commit — bench.yml appends the current commit's row
        # concurrently, so this page catches up on the next push (a ~1-commit
        # lag, fine for a trend view). Best-effort: if bench-data has no history
        # yet, skip without failing the deploy.
        run: |
          git fetch --depth 1 origin bench-data 2>/dev/null || true
          if git show FETCH_HEAD:bench-history.tsv > /tmp/bench-history.tsv 2>/dev/null; then
            python3 scripts/bench-visualize.py --standalone --site-chrome \
              /tmp/bench-history.tsv -o wasm-demo/bench-trend.html
          else
            echo "no bench-history.tsv on bench-data yet; skipping bench-trend"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: wasm-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
