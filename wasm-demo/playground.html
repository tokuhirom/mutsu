<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mutsu playground — write Raku, run it, read the output</title>
<meta name="description" content="An in-browser Raku playground: write a program, run it, and read what it printed. Powered by mutsu — a Raku interpreter written in Rust and compiled to WebAssembly.">
<link rel="stylesheet" href="assets/site.css">
</head>
<body>

<nav class="site-nav"></nav>

<noscript>
  <p class="section">The playground runs a Raku interpreter in your browser, so it needs
  JavaScript and WebAssembly enabled. The language itself is documented at
  <a href="https://docs.raku.org/">docs.raku.org</a>.</p>
</noscript>

<div class="container">
  <header class="page-head">
    <h1 id="page-title"></h1>
    <p class="page-intro" id="page-intro"></p>
  </header>

  <div class="examples" id="examples"></div>
  <div id="example-desc"></div>

  <div>
    <div class="pane-title" id="editor-title"></div>
    <div id="editor-host"></div>
  </div>

  <div class="run-row">
    <button id="run-btn" class="btn"></button>
    <span class="hint" id="run-hint"></span>
    <span class="grow"></span>
    <button id="share-btn" class="btn-ghost"></button>
    <button id="reset-btn" class="btn-ghost"></button>
  </div>

  <div>
    <div class="pane-title" id="output-title"></div>
    <div id="output" class="output output-pane muted"></div>
  </div>

  <p class="page-cta"><a id="repl-cta" href="repl.html"></a></p>
</div>

<footer class="site-footer"></footer>

<div id="toast"></div>

<script type="module">
import { renderChrome, t, currentLang, langHref } from './assets/i18n.js';
import { createEditor } from './assets/editor.js';
import { runIsolated, looksLikeError, isReady, boot } from './assets/runner.js';
import { PROGRAMS } from './content/examples.js';

renderChrome('playground');

const runBtn = document.getElementById('run-btn');
const shareBtn = document.getElementById('share-btn');
const resetBtn = document.getElementById('reset-btn');
const outEl = document.getElementById('output');
const descEl = document.getElementById('example-desc');
const examplesEl = document.getElementById('examples');
const toastEl = document.getElementById('toast');

const DEFAULT_CODE = 'say "Hello from mutsu!";';

/* ------------------------------------------------------------------ *
 * Examples
 * ------------------------------------------------------------------ */

/* The picked example, so a language switch can repaint its description in the
   new language rather than leaving the old one behind. */
let active = null;
const groupLabels = [];
const exampleButtons = [];

function renderExamples() {
  const groups = [];
  for (const ex of PROGRAMS) {
    const name = ex.group.en;
    let g = groups.find(g => g.name === name);
    if (!g) groups.push(g = { name, group: ex.group, items: [] });
    g.items.push(ex);
  }
  for (const g of groups) {
    const row = document.createElement('div');
    row.className = 'example-group';
    const label = document.createElement('span');
    label.className = 'group-label';
    row.appendChild(label);
    groupLabels.push({ el: label, group: g.group });
    for (const ex of g.items) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = ex.name;
      btn.addEventListener('click', () => loadExample(ex, btn));
      row.appendChild(btn);
      exampleButtons.push({ el: btn, ex });
    }
    examplesEl.appendChild(row);
  }
}

function loadExample(ex, btn) {
  editor.setCode(ex.code);
  original = ex.code;
  if (active && active.btn) active.btn.classList.remove('active');
  active = { ex, btn };
  if (btn) btn.classList.add('active');
  clearOutput();
  paintExampleText();
  editor.textarea.focus();
}

function paintExampleText() {
  const lang = currentLang();
  for (const g of groupLabels) g.el.textContent = g.group[lang] || g.group.en;
  for (const b of exampleButtons) b.el.title = b.ex.desc[lang] || b.ex.desc.en;
  if (active === null) descEl.textContent = t('pg.pick');
  else if (active.ex === null) descEl.textContent = t('pg.loaded');
  else descEl.textContent = active.ex.desc[lang] || active.ex.desc.en;
}

/* ------------------------------------------------------------------ *
 * Editor
 * ------------------------------------------------------------------ */

const editor = createEditor(document.getElementById('editor-host'), {
  code: DEFAULT_CODE,
  minHeight: '15rem',
  label: 'Raku code',
  onRun: () => run(),
});
// Stable ids for the e2e suite and for anything linking into the page.
editor.textarea.id = 'code';
document.querySelector('#editor-host pre').id = 'highlight';

let original = DEFAULT_CODE;

/* ------------------------------------------------------------------ *
 * Running
 * ------------------------------------------------------------------ */

let busy = false;

function clearOutput() {
  outEl.className = 'output output-pane muted';
  delete outEl.dataset.ran;
  outEl.textContent = t('output.empty');
}

async function run() {
  if (busy) return;
  const code = editor.getCode();
  if (!code.trim()) return;
  busy = true;
  runBtn.disabled = true;
  runBtn.textContent = isReady() ? t('run.running') : t('run.loading');
  // Let the button repaint before the VM blocks this thread.
  await new Promise(r => setTimeout(r, 0));

  // Each run gets a clean interpreter: this page is "run a program and read
  // its output", so nothing may leak in from the run before it.  The REPL page
  // is where a session that remembers things lives.
  const res = await runIsolated(code);
  outEl.className = 'output output-pane';
  outEl.dataset.ran = '1';
  if (!res.output) {
    outEl.classList.add('muted');
    outEl.textContent = t('output.none');
  } else {
    outEl.textContent = res.output;
    if (res.crashed || looksLikeError(res.output)) outEl.classList.add('error');
  }
  busy = false;
  runBtn.disabled = false;
  runBtn.textContent = t('run');
}

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 1600);
}

runBtn.addEventListener('click', run);
resetBtn.addEventListener('click', () => {
  editor.setCode(original);
  clearOutput();
  editor.textarea.focus();
});

/* ------------------------------------------------------------------ *
 * Permalinks: #code=<base64url of UTF-8>
 * ------------------------------------------------------------------ */

function encodeCode(text) {
  const bytes = new TextEncoder().encode(text);
  let bin = '';
  for (const b of bytes) bin += String.fromCharCode(b);
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function decodeCode(enc) {
  const b64 = enc.replace(/-/g, '+').replace(/_/g, '/');
  const bin = atob(b64);
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

shareBtn.addEventListener('click', async () => {
  const url = location.origin + location.pathname + '#code=' + encodeCode(editor.getCode());
  try {
    await navigator.clipboard.writeText(url);
    toast(t('pg.share.copied'));
  } catch {
    location.hash = 'code=' + encodeCode(editor.getCode());
    toast(t('pg.share.hash'));
  }
});

function loadFromHash() {
  const m = /^#code=(.+)$/.exec(location.hash);
  if (!m) return false;
  try {
    const code = decodeCode(m[1]);
    editor.setCode(code);
    original = code;
    active = { ex: null, btn: null };
    return true;
  } catch {
    return false;
  }
}

/* ------------------------------------------------------------------ *
 * Language-dependent text
 * ------------------------------------------------------------------ */

function paintText() {
  document.getElementById('page-title').textContent = t('pg.title');
  document.getElementById('page-intro').textContent = t('pg.intro');
  document.getElementById('editor-title').textContent = t('editor');
  document.getElementById('output-title').textContent = t('output');
  document.getElementById('run-hint').textContent = t('run.hint');
  shareBtn.textContent = t('pg.share');
  resetBtn.textContent = t('reset');
  if (!busy) runBtn.textContent = t('run');
  const cta = document.getElementById('repl-cta');
  cta.textContent = t('pg.repl-cta');
  cta.href = langHref('repl.html');
  paintExampleText();
  // An untouched output pane shows a prompt, which is language-dependent; a
  // pane holding real output must not be overwritten by a language switch.
  if (!outEl.dataset.ran) outEl.textContent = t('output.empty');
}

/* ------------------------------------------------------------------ *
 * Boot
 * ------------------------------------------------------------------ */

renderExamples();
loadFromHash();
paintText();
window.addEventListener('langchange', paintText);

// This page exists to run code, so the interpreter is fetched up front rather
// than on first interest.
boot().then(() => { document.body.dataset.ready = '1'; })
      .catch(e => {
        outEl.className = 'output output-pane error';
        outEl.dataset.ran = '1';
        outEl.textContent = t('repl.load-failed', { msg: e.message });
      });
</script>

</body>
</html>
